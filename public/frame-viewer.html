<!DOCTYPE html>
<html>
<head>
    <title>Frame Viewer</title>
    <style>
        body { display: flex; flex-wrap: wrap; background: #000; color: #fff; font-family: sans-serif; }
        .frame { width: 150px; margin: 5px; text-align: center; }
        .frame img { max-width: 100%; height: auto; }
    </style>
</head>
<body>
    <script>
        for (let i = 1; i <= 132; i++) {
            const padded = String(i).padStart(3, '0');
            document.write(`
                <div class="frame">
                    <img src="./project2/ezgif-frame-${padded}.jpg" />
                    <div>Frame ${i}</div>
                </div>
            `);
        }
    </script>
</body>
</html>
